<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク・プロジェクト管理</title>
  
  <!-- Google Fonts & Material Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <!-- SortableJS (ドラッグ＆ドロップ用) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <style>
    /* ----------------------------------
       CSS変数 & 基本設定
    ---------------------------------- */
    :root {
      --bg-color: #0b0f19;
      --bg-gradient: radial-gradient(circle at 50% 0%, #151d30 0%, #0b0f19 70%);
      --card-bg: rgba(22, 29, 49, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover: rgba(30, 41, 69, 0.8);
      
      --text-main: #f3f4f6;
      --text-sub: #9ca3af;
      --text-muted: #6b7280;
      
      --accent-biz: #3b82f6;      /* 仕事用：爽やかなブルー */
      --accent-private: #a855f7;  /* 私用：鮮やかなパープル */
      
      /* 期日ステータスカラー */
      --status-overdue: #ef4444;  /* 期限切れ：コーラルレッド */
      --status-today: #fbbf24;    /* 今日：ゴールド */
      --status-upcoming: #34d399; /* 今後：エメラルドグリーン */
      --status-nodate: #9ca3af;   /* 日付なし：グレー */
      
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.15);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.4);
      --glass-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      
      font-family: 'Outfit', 'Noto Sans JP', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      background-image: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ----------------------------------
       共通レイアウト
    ---------------------------------- */
    header {
      background: rgba(11, 15, 25, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo span.icon {
      color: var(--accent-biz);
      font-size: 28px;
      background: linear-gradient(135deg, var(--accent-biz), var(--accent-private));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-logo h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .main-container {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 16px 100px 16px; /* 下部ナビゲーションを避ける余白 */
    }

    /* ----------------------------------
       上部タブ（項目切り替え & 画面切り替え）
    ---------------------------------- */
    .filter-tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 20px;
      border: 1px solid var(--card-border);
    }

    .filter-tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 500;
      border-radius: calc(var(--radius-md) - 4px);
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
      color: var(--text-sub);
    }

    .filter-tab.active {
      background: var(--card-bg);
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* ----------------------------------
       タスクリスト表示領域
    ---------------------------------- */
    .task-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 24px 0 12px 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .task-section-header.overdue { color: var(--status-overdue); }
    .task-section-header.today { color: var(--status-today); }
    .task-section-header.upcoming { color: var(--status-upcoming); }
    .task-section-header.nodate { color: var(--status-nodate); }

    .task-section-header span {
      font-size: 18px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ----------------------------------
       タスクカード（グラスモルフィズム風）
    ---------------------------------- */
    .task-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm), var(--glass-shadow);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    /* 左端のPrivate/Biz区分インジケータバー */
    .task-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--text-muted);
    }
    .task-card.Private::before { background: var(--accent-private); }
    .task-card.Biz::before { background: var(--accent-biz); }

    .task-card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg), var(--glass-shadow);
    }

    /* 完了チェックボタン */
    .complete-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
      background: transparent;
    }

    .task-card.Private .complete-btn:hover { border-color: var(--accent-private); background: rgba(168, 85, 247, 0.1); }
    .task-card.Biz .complete-btn:hover { border-color: var(--accent-biz); background: rgba(59, 130, 246, 0.1); }

    .complete-btn span {
      font-size: 16px;
      color: transparent;
      transition: var(--transition);
      font-weight: bold;
    }

    .complete-btn:active {
      transform: scale(0.85);
    }

    /* アニメーション用クラス */
    .task-card.completing {
      animation: completeFadeOut 0.5s forwards;
    }

    @keyframes completeFadeOut {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(0.95) translateX(30px);
        background: rgba(16, 185, 129, 0.2);
        border-color: var(--status-upcoming);
      }
      100% {
        opacity: 0;
        transform: scale(0.9) translateX(100px);
        height: 0;
        padding-top: 0;
        padding-bottom: 0;
        margin-top: 0;
        margin-bottom: 0;
        border: none;
      }
    }

    /* カードテキスト */
    .task-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0; /* はみ出し防止 */
    }

    .task-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-main);
      word-break: break-all;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-sub);
    }

    .project-badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-card.Private .project-badge { color: #d8b4fe; }
    .task-card.Biz .project-badge { color: #93c5fd; }

    .time-badge {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .repeat-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      color: var(--status-upcoming);
    }

    /* 期日インジケータ */
    .date-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: 600;
    }
    .task-card.overdue .date-badge { color: var(--status-overdue); }
    .task-card.today .date-badge { color: var(--status-today); }
    .task-card.upcoming .date-badge { color: var(--status-upcoming); }

    /* ----------------------------------
       新規作成ボタン (FAB)
    ---------------------------------- */
    .fab {
      position: fixed;
      bottom: 80px; /* ボトムナビの上 */
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-biz), var(--accent-private));
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      border: none;
      z-index: 90;
      transition: var(--transition);
    }

    .fab:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 12px 30px rgba(168, 85, 247, 0.6);
    }

    .fab span {
      font-size: 28px;
    }

    /* ----------------------------------
       下部ナビゲーション (スマホ対応)
    ---------------------------------- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(11, 15, 25, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--card-border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: var(--transition);
      user-select: none;
      flex: 1;
      padding: 8px 0;
    }

    .nav-item span.icon {
      font-size: 24px;
    }

    .nav-item.active {
      color: var(--text-main);
    }

    .nav-item.active span.icon {
      color: var(--accent-biz);
      font-variation-settings: 'FILL' 1;
    }

    /* ----------------------------------
       ポップアップモーダル
    ---------------------------------- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
      padding: 16px;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: #111827;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      transform: translateY(30px);
      transition: var(--transition);
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
    }

    .modal-body {
      padding: 20px;
    }

    /* ----------------------------------
       フォームパーツ
    ---------------------------------- */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-sub);
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      padding: 12px;
      font-size: 15px;
      transition: var(--transition);
      font-family: inherit;
    }

    .form-select option {
      background-color: #111827; /* ドロップダウンメニューの背景を濃い色に固定 */
      color: var(--text-main);   /* 文字色を白に固定 */
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent-biz);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    /* Biz/Privateセグメント切り替え */
    .segment-control {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-sm);
      padding: 3px;
      border: 1px solid var(--card-border);
    }

    .segment-btn {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      border-radius: calc(var(--radius-sm) - 2px);
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-sub);
      user-select: none;
    }

    .segment-btn.Biz.active {
      background: var(--accent-biz);
      color: white;
    }

    .segment-btn.Private.active {
      background: var(--accent-private);
      color: white;
    }

    /* 時間選択（横並び） */
    .time-range {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .time-range .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .time-separator {
      color: var(--text-sub);
      margin-top: 24px;
    }

    .modal-footer {
      padding: 20px;
      border-top: 1px solid var(--card-border);
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-biz), var(--accent-private));
      color: white;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    
    .btn-danger {
      background: var(--status-overdue);
      color: white;
      max-width: 80px;
      flex: none;
    }
    .btn-danger:hover {
      opacity: 0.9;
    }

    /* ----------------------------------
       トースト通知 (Toast)
    ---------------------------------- */
    .toast-container {
      position: fixed;
      bottom: 84px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(52, 211, 153, 0.3);
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--status-upcoming);
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
      z-index: 300;
    }

    .toast-container.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ----------------------------------
       ローディングスピナー
    ---------------------------------- */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 15, 25, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-biz);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ----------------------------------
       プロジェクト管理 & 履歴画面用スタイル
    ---------------------------------- */
    .sub-page {
      display: none;
    }
    .sub-page.active {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      position: relative;
      overflow: hidden;
    }
    .project-card.Private { border-top: 3px solid var(--accent-private); }
    .project-card.Biz { border-top: 3px solid var(--accent-biz); }
    
    .done-task-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--card-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0.7;
    }

    .done-task-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .done-task-title {
      font-size: 14px;
      text-decoration: line-through;
      color: var(--text-sub);
    }

    /* ----------------------------------
       インフォメッセージ（データが空のとき）
    ---------------------------------- */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-sub);
    }
    .empty-state span {
      font-size: 48px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ドラッグ＆ドロップ用プレースホルダー */
    .sortable-ghost {
      opacity: 0.3;
      background: rgba(59, 130, 246, 0.1) !important;
      border: 2px dashed rgba(59, 130, 246, 0.4) !important;
    }
    
    /* ドラッグ可能であることを示すカーソル */
    .task-info {
      cursor: grab;
    }
    .task-info:active {
      cursor: grabbing;
    }

    /* 同期中インジケータ */
    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--accent-biz);
      background: rgba(59, 130, 246, 0.1);
      padding: 4px 10px;
      border-radius: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      margin-left: 12px;
    }
    .sync-indicator.active {
      opacity: 1;
    }
    .spin-icon {
      animation: spin 1s infinite linear;
      font-size: 16px !important;
    }
  </style>
</head>
<body>

  <!-- ローディング表示 -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <div style="font-weight: 500; font-size: 14px;">読み込み中...</div>
  </div>

  <!-- ヘッダー -->
  <header>
    <div class="header-logo">
      <span class="material-symbols-outlinet icon">task_alt</span>
      <h1 id="app-title">タスク管理</h1>
      <!-- 同期中インジケータ -->
      <div id="sync-indicator" class="sync-indicator">
        <span class="material-symbols-outlined spin-icon">sync</span>
        <span>同期中...</span>
      </div>
    </div>
    <div id="header-actions">
      <!-- ヘッダーの右側に情報バッジなどを配置可能 -->
    </div>
  </header>

  <!-- メインコンテンツ -->
  <div class="main-container">

    <!-- ==================== 1. タスク一覧画面 ==================== -->
    <div id="page-tasks" class="sub-page active">
      <!-- 区分フィルター (All / Biz / Private) -->
      <div class="filter-tabs">
        <div class="filter-tab active" onclick="setFilterType('All')">すべて</div>
        <div class="filter-tab" onclick="setFilterType('Biz')">Biz</div>
        <div class="filter-tab" onclick="setFilterType('Private')">Private</div>
      </div>

      <!-- 表示モード切り替え（期日別 / 日付指定 / プロジェクト別） -->
      <div class="filter-tabs" style="margin-top: 8px; background: rgba(255, 255, 255, 0.02);">
        <div class="filter-tab active" id="mode-tab-group" onclick="setViewMode('group')">

        </div>

          <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle; margin-right: 4px;">folder_open</span>プロジェクト別
        </div>

      <!-- 日付指定フィルター（デフォルト非表示） -->

      <div id="project-filter-container" class="form-group" style="display: none; margin-top: 12px; background: var(--card-bg); padding: 12px; border: 1px solid var(--card-border); border-radius: var(--radius-sm);">
        <label class="form-label" for="task-project-filter-select">プロジェクトを選択</label>
        <select id="task-project-filter-select" class="form-select" onchange="renderTaskList()"></select>

      <!-- タスクリストコンテナ（JSで中身を構築） -->

    <!-- ==================== 2. プロジェクト管理画面 ==================== -->
    <div id="page-projects" class="sub-page">
      <div class="task-section-header upcoming">
        <span class="material-symbols-outlined">folder_open</span>
        <h2>プロジェクト一覧</h2>

        <div class="form-group">
          <label class="form-label">プロジェクト区分</label>

            <div class="segment-btn Private active" onclick="setNewProjectType('Private')">Private</div>

  <div id="task-modal" class="modal-overlay">

          <select id="task-repeat-select" class="form-select">

        <!-- 詳細説明 -->

        <!-- 続けて登録するチェックボックス -->

          <input type="checkbox" id="task-keep-open" style="width: 18px; height: 18px; cursor: pointer;">
          <label for="task-keep-open" style="font-size: 14px; color: var(--text-sub); cursor: pointer; user-select: none;">続けて別のタスクを登録する</label>

  <!-- トースト通知 -->

    <span id="toast-message">完了しました</span>
  </div>

  <!-- ==================== JavaScript ロジック ==================== -->
  <script>
    // GAS環境判定
    const isGas = typeof google !== 'undefined' && google.script && google.script.run;

    // モックデータ (ローカルブラウザでの確認用)
    const MOCK_DATA = {
      tasks: [
        { id: "1", status: false, repeat: "Daily", type: "Private", projectName: "#もくもく", projectId: "101", task: "朝のスクワット・ストレッチ", date: getOffsetDateString(0), startTime: "07:30", endTime: "08:00", description: "毎日の習慣にする" },
        { id: "2", status: false, repeat: "None", type: "Biz", projectName: "260307_とわ機農海外", projectId: "201", task: "海外市場データのまとめ", date: getOffsetDateString(-1), startTime: "10:00", endTime: "12:00", description: "期限切れのテストデータ" },
        { id: "3", status: false, repeat: "Weekly", type: "Private", projectName: "#ノンプロ研", projectId: "301", task: "週次振り返り＆学習計画", date: getOffsetDateString(0), startTime: "21:00", endTime: "22:00", description: "今週の進捗をまとめる" },
        { id: "4", status: false, repeat: "None", type: "Biz", projectName: "260414_とわ機農国内", projectId: "203", task: "国内代理店とのミーティング", date: getOffsetDateString(1), startTime: "14:00", endTime: "15:00", description: "新商品のフィードバックをもらう" },
        { id: "5", status: false, repeat: "Monthly", type: "Private", projectName: "#読書", projectId: "306", task: "月イチの課題図書読了", date: getOffsetDateString(5), startTime: "", endTime: "", description: "「世界の一流はなぜ瞑想をするのか」" },
        { id: "6", status: false, repeat: "None", type: "Private", projectName: "#inbox", projectId: "100", task: "部屋の片付け", date: "", startTime: "", endTime: "", description: "期日なしタスクのテスト" }
      ],
      projects: [
        { id: "100", name: "#inbox", type: "Private" },
        { id: "101", name: "#もくもく", type: "Private" },
        { id: "201", name: "260307_とわ機農海外", type: "Biz" },
        { id: "203", name: "260414_とわ機農国内", type: "Biz" },
        { id: "301", name: "#ノンプロ研", type: "Private" },
        { id: "306", name: "#読書", type: "Private" }
      ],
      doneTasks: [
        { id: "10", status: true, repeat: "None", type: "Private", projectName: "#もくもく", projectId: "101", task: "タスク管理アプリ開発の構想", date: getOffsetDateString(-1), startTime: "19:00", endTime: "20:00", description: "完了タスクのサンプル" }
      ]
    };

    // アプリケーション状態
    let state = {
      tasks: [],
      projects: [],
      doneTasks: [],
      filterType: 'All', // 'All', 'Biz', 'Private'
      viewMode: 'group', // 'group' (期日別), 'date' (日付指定), 'project' (プロジェクト別)
      activePage: 'tasks', // 'tasks', 'projects', 'history'
      formTaskType: 'Private',
      newProjectType: 'Private'
    };

    // 起動処理
    window.addEventListener('DOMContentLoaded', () => {
      showLoading(true);
      if (isGas) {
        // GASから本番データをロード
        google.script.run
          .withSuccessHandler(data => {
            state.tasks = data.tasks;
            state.projects = data.projects;
            state.doneTasks = data.doneTasks;
            initApp();
            showLoading(false);
          })
          .withFailureHandler(err => {
            alert('データの読み込みに失敗しました: ' + err.message);
            showLoading(false);
          })
          .getInitialData();
      } else {
        // ローカルブラウザ向け（モック動作）
        console.log("Mock Mode Active");
        state.tasks = [...MOCK_DATA.tasks];
        state.projects = [...MOCK_DATA.projects];
        state.doneTasks = [...MOCK_DATA.doneTasks];
        setTimeout(() => {
          initApp();
          showLoading(false);
        }, 800);
      }
    });

    // 初期化
    function initApp() {
      renderTaskList();
      renderProjectList();
      renderHistoryList();
      populateProjectSelect();
      populateFilterProjectSelect();
      
      // 日付フィルターの初期値に今日をセット
      document.getElementById('task-date-filter-input').value = formatDateString(new Date());
    }

    // ----------------------------------
    // ページ・フィルタ切り替え
    // ----------------------------------
    function switchPage(pageId, navElement) {
      state.activePage = pageId;
      
      // サブページ表示切り替え
      document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      
      // ナビゲーションのactive切り替え
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      navElement.classList.add('active');
      
      // FABの表示制御（タスク画面のときのみ表示）
      const fab = document.getElementById('add-task-fab');
      if (pageId === 'tasks') {
        fab.style.display = 'flex';
      } else {
        fab.style.display = 'none';
      }
    }

    function setFilterType(type) {
      state.filterType = type;
      
      // 区分フィルタータブのactive切り替え
      const tabs = document.querySelectorAll('.filter-tabs:first-of-type .filter-tab');
      tabs.forEach(tab => {
        tab.classList.remove('active');
        if (tab.innerText === (type === 'All' ? 'すべて' : type)) {
          tab.classList.add('active');
        }
      });
      
      renderTaskList();
    }

    function setViewMode(mode) {
      state.viewMode = mode;
      
      // 表示モードタブのactive切り替え
      document.getElementById('mode-tab-group').classList.remove('active');
      document.getElementById('mode-tab-date').classList.remove('active');
      document.getElementById('mode-tab-project').classList.remove('active');
      
      if (mode === 'group') document.getElementById('mode-tab-group').classList.add('active');
      if (mode === 'date') document.getElementById('mode-tab-date').classList.add('active');
      if (mode === 'project') document.getElementById('mode-tab-project').classList.add('active');
      
      // コントロールの表示切り替え
      document.getElementById('date-filter-container').style.display = mode === 'date' ? 'block' : 'none';
      document.getElementById('project-filter-container').style.display = mode === 'project' ? 'block' : 'none';
      
      renderTaskList();
    }

    function populateFilterProjectSelect() {
      const select = document.getElementById('task-project-filter-select');
      if (!select) return;
      select.innerHTML = '';
      
      const defOpt = document.createElement('option');
      defOpt.value = '';
      defOpt.innerText = 'プロジェクトを選択してください...';
      select.appendChild(defOpt);
      
      state.projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.innerText = `${p.name} (${p.type === 'Biz' ? 'Biz' : 'Private'})`;
        select.appendChild(opt);
      });
    }

    // ----------------------------------
    // レンダー処理
    // ----------------------------------
    
    // タスクリストのレンダリング
    function renderTaskList() {
      const container = document.getElementById('task-list-container');
      container.innerHTML = '';

      // フィルタリング
      let filtered = state.tasks;
      if (state.filterType !== 'All') {
        filtered = state.tasks.filter(t => t.type === state.filterType);
      }

      if (state.viewMode === 'group') {
        renderGroupedTaskList(filtered, container);
      } else if (state.viewMode === 'date') {
        renderDateTaskList(filtered, container);
      } else if (state.viewMode === 'project') {
        renderProjectTaskList(filtered, container);
      }

      // ドラッグ＆ドロップ機能の有効化
      initSortable();
    }

    // 期日別グループ表示
    function renderGroupedTaskList(filtered, container) {
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="material-symbols-outlined">playlist_add</span>
            <p>タスクはありません。右下の＋ボタンから追加してください。</p>
          </div>
        `;
        return;
      }

      // 期日ベースでグループ分け
      // グループ定義: 期限切れ (Overdue), 今日 (Today), 明日 (Tomorrow), 今後 (Upcoming), 期日なし (NoDate)
      const groups = {
        overdue: { title: '期限切れ', icon: 'warning', list: [], class: 'overdue' },
        today: { title: '今日', icon: 'today', list: [], class: 'today' },
        tomorrow: { title: '明日', icon: 'event', list: [], class: 'upcoming' },
        upcoming: { title: '今後', icon: 'calendar_month', list: [], class: 'upcoming' },
        nodate: { title: '期日なし', icon: 'question_mark', list: [], class: 'nodate' }
      };

      const now = new Date();
      now.setHours(0, 0, 0, 0);
      const todayStr = formatDateString(now);

      const tomorrow = new Date(now.getTime());
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tomorrowStr = formatDateString(tomorrow);

      filtered.forEach(task => {
        if (!task.date) {
          groups.nodate.list.push(task);
        } else {
          const taskDateStr = task.date; // yyyy-MM-dd
          if (taskDateStr < todayStr) {
            groups.overdue.list.push(task);
          } else if (taskDateStr === todayStr) {
            groups.today.list.push(task);
          } else if (taskDateStr === tomorrowStr) {
            groups.tomorrow.list.push(task);
          } else {
            groups.upcoming.list.push(task);
          }
        }
      });

      // 各グループの描画
      Object.keys(groups).forEach(key => {
        const group = groups[key];
        if (group.list.length > 0) {
          // グループヘッダー
          const header = document.createElement('div');
          header.className = `task-section-header ${group.class}`;
          header.innerHTML = `
            <span class="material-symbols-outlined">${group.icon}</span>
            <span>${group.title} (${group.list.length})</span>
          `;
          container.appendChild(header);

          // リスト
          const listContainer = document.createElement('div');
          listContainer.className = 'task-list';

          group.list.forEach(task => {
            const card = createTaskCard(task, key);
            listContainer.appendChild(card);
          });

          container.appendChild(listContainer);
        }
      });
    }

    // 日付指定表示
    function renderDateTaskList(filtered, container) {
      const dateVal = document.getElementById('task-date-filter-input').value;
      if (!dateVal) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="material-symbols-outlined">calendar_today</span>
            <p>日付を選択してください。</p>
          </div>
        `;
        return;
      }

      const dateTasks = filtered.filter(t => t.date === dateVal);
      
      const d = new Date(dateVal.replace(/-/g, "/"));
      const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
      const dateDisplay = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日(${dayOfWeek})`;

      // セクションヘッダー
      const header = document.createElement('div');
      header.className = 'task-section-header today';
      header.innerHTML = `
        <span class="material-symbols-outlined">calendar_today</span>
        <span>${dateDisplay} のタスク (${dateTasks.length})</span>
      `;
      container.appendChild(header);

      if (dateTasks.length === 0) {
        container.innerHTML += `
          <div class="empty-state" style="padding: 20px;">
            <span class="material-symbols-outlined" style="font-size: 32px;">info</span>
            <p>この日のタスクはありません。</p>
          </div>
        `;
        return;
      }

      const listContainer = document.createElement('div');
      listContainer.className = 'task-list';

      dateTasks.forEach(task => {
        const card = createTaskCard(task, 'today');
        listContainer.appendChild(card);
      });

      container.appendChild(listContainer);
    }

    // プロジェクト別表示
    function renderProjectTaskList(filtered, container) {
      const projectId = document.getElementById('task-project-filter-select').value;
      if (!projectId) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="material-symbols-outlined">folder_open</span>
            <p>プロジェクトを選択してください。</p>
          </div>
        `;
        return;
      }

      const project = state.projects.find(p => p.id === projectId);
      const projName = project ? project.name : '不明なプロジェクト';
      const projTasks = filtered.filter(t => t.projectId === projectId);

      // 期日順にソート（期日がないタスクは最後に）
      projTasks.sort((a, b) => {
        if (!a.date) return 1;
        if (!b.date) return -1;
        return a.date.localeCompare(b.date);
      });

      // セクションヘッダー
      const header = document.createElement('div');
      header.className = `task-section-header ${project && project.type === 'Biz' ? 'upcoming' : 'nodate'}`;
      header.innerHTML = `
        <span class="material-symbols-outlined">folder</span>
        <span>${projName} のタスク (${projTasks.length})</span>
      `;
      container.appendChild(header);

      if (projTasks.length === 0) {
        container.innerHTML += `
          <div class="empty-state" style="padding: 20px;">
            <span class="material-symbols-outlined" style="font-size: 32px;">info</span>
            <p>このプロジェクトに紐づくタスクはありません。</p>
          </div>
        `;
        return;
      }

      const listContainer = document.createElement('div');
      listContainer.className = 'task-list';

      projTasks.forEach(task => {
        let groupKey = 'upcoming';
        const nowStr = formatDateString(new Date());
        if (task.date && task.date < nowStr) {
          groupKey = 'overdue';
        } else if (task.date && task.date === nowStr) {
          groupKey = 'today';
        } else if (!task.date) {
          groupKey = 'nodate';
        }
        
        const card = createTaskCard(task, groupKey);
        listContainer.appendChild(card);
      });

      container.appendChild(listContainer);
    }

    // タスクカードのDOM作成
    function createTaskCard(task, groupKey) {
      const card = document.createElement('div');
      card.className = `task-card ${task.type} ${groupKey === 'overdue' ? 'overdue' : ''} ${groupKey === 'today' ? 'today' : ''}`;
      card.id = `task-card-${task.id}`;
      card.setAttribute('data-id', task.id);
      
      // プロジェクト名
      const projName = task.projectName || state.projects.find(p => p.id === task.projectId)?.name || '未分類';
      
      // 期日の曜日付き日本語フォーマット
      let dateDisplay = '';
      if (task.date) {
        const d = new Date(task.date.replace(/-/g, "/"));
        const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
        dateDisplay = `${d.getMonth() + 1}/${d.getDate()}(${dayOfWeek})`;
      }

      // 時間帯の表示
      let timeDisplay = '';
      if (task.startTime) {
        timeDisplay = task.startTime;
        if (task.endTime) {
          timeDisplay += ` 〜 ${task.endTime}`;
        }
      }

      card.innerHTML = `
        <button class="complete-btn" onclick="completeTask(event, '${task.id}')">
          <span class="material-symbols-outlined">done</span>
        </button>
        <div class="task-info" onclick="openEditModal('${task.id}')">
          <div class="task-title">${escapeHtml(task.task)}</div>
          <div class="task-meta">
            <span class="project-badge">#${escapeHtml(projName.replace(/^#/, ''))}</span>
            ${task.date ? `
              <span class="date-badge">
                <span class="material-symbols-outlined" style="font-size:13px;">calendar_today</span>
                ${dateDisplay}
              </span>
            ` : ''}
            ${timeDisplay ? `
              <span class="time-badge">
                <span class="material-symbols-outlined" style="font-size:13px;">schedule</span>
                ${timeDisplay}
              </span>
            ` : ''}
            ${task.repeat && task.repeat !== 'None' ? `
              <span class="repeat-badge">
                <span class="material-symbols-outlined" style="font-size:13px;">sync</span>
                ${task.repeat}
              </span>
            ` : ''}
          </div>
        </div>
      `;

      return card;
    }

    // プロジェクトリストのレンダリング
    function renderProjectList() {
      const container = document.getElementById('project-list-container');
      container.innerHTML = '';
      
      if (state.projects.length === 0) {
        container.innerHTML = '<div style="color: var(--text-sub);">プロジェクトが登録されていません。</div>';
        return;
      }

      state.projects.forEach(p => {
        const card = document.createElement('div');
        card.className = `project-card ${p.type}`;
        card.innerText = p.name;
        container.appendChild(card);
      });
    }

    // 完了履歴リストのレンダリング
    function renderHistoryList() {
      const container = document.getElementById('history-list-container');
      container.innerHTML = '';

      if (state.doneTasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="material-symbols-outlined">history</span>
            <p>完了履歴はありません。</p>
          </div>
        `;
        return;
      }

      state.doneTasks.forEach(task => {
        const card = document.createElement('div');
        card.className = 'done-task-card';
        
        let dateDisplay = '';
        if (task.date) {
          const d = new Date(task.date.replace(/-/g, "/"));
          const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
          dateDisplay = `${d.getMonth() + 1}/${d.getDate()}(${dayOfWeek})`;
        }
        
        card.innerHTML = `
          <div class="done-task-header">
            <span>#${escapeHtml(task.projectName.replace(/^#/, ''))} (${task.type})</span>
            <span>${dateDisplay} ${task.startTime || ''}</span>
          </div>
          <div class="done-task-title">${escapeHtml(task.task)}</div>
        `;
        container.appendChild(card);
      });
    }

    // ----------------------------------
    // データフォーム操作（モーダル）
    // ----------------------------------
    
    // プロジェクト選択のプルダウンを構築
    function populateProjectSelect() {
      const select = document.getElementById('task-project-select');
      select.innerHTML = '';
      
      // 表示中のセグメントタイプ（Private または Biz）に一致するプロジェクトのみを表示
      const filteredProj = state.projects.filter(p => p.type === state.formTaskType);
      
      filteredProj.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.innerText = p.name;
        select.appendChild(opt);
      });
    }

    function openAddModal() {
      document.getElementById('modal-title').innerText = 'タスクを作成';
      document.getElementById('task-id-input').value = '';
      
      // 連続登録用のチェックボックスを表示
      document.getElementById('keep-open-group').style.display = 'flex';
      
      // 初期値リセット
      setFormTaskType('Private'); // 初期はPrivate
      document.getElementById('task-title-input').value = '';
      
      // 期日に「今日」をデフォルトセット
      const today = new Date();
      document.getElementById('task-date-input').value = formatDateString(today);
      
      document.getElementById('task-start-input').value = '';
      document.getElementById('task-end-input').value = '';
      document.getElementById('task-repeat-select').value = 'None';
      document.getElementById('task-desc-input').value = '';
      
      // おもてなし機能：プロジェクト別フィルターで選択されているプロジェクトがあれば、そのプロジェクトと区分を初期値に自動割り当て
      if (state.viewMode === 'project') {
        const filterProjSelect = document.getElementById('task-project-filter-select');
        if (filterProjSelect && filterProjSelect.value) {
          const project = state.projects.find(p => p.id === filterProjSelect.value);
          if (project) {
            setFormTaskType(project.type);
            document.getElementById('task-project-select').value = project.id;
          }
        }
      }

      document.getElementById('save-btn-text').innerText = '追加';
      
      // 削除ボタンがあれば削除する (新規作成時には不要)
      const footer = document.querySelector('.modal-footer');
      const deleteBtn = document.getElementById('modal-delete-btn');
      if (deleteBtn) deleteBtn.remove();

      document.getElementById('task-modal').classList.add('active');
      
      // モーダル表示後にタスク名入力欄にフォーカスを合わせる
      setTimeout(() => {
        document.getElementById('task-title-input').focus();
      }, 100);
    }

    function openEditModal(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      document.getElementById('modal-title').innerText = 'タスクを編集';
      document.getElementById('task-id-input').value = task.id;
      
      // 編集時は連続登録チェックボックスを非表示にする
      document.getElementById('keep-open-group').style.display = 'none';

      setFormTaskType(task.type);
      document.getElementById('task-project-select').value = task.projectId;
      document.getElementById('task-title-input').value = task.task;
      document.getElementById('task-date-input').value = task.date;
      document.getElementById('task-start-input').value = task.startTime;
      document.getElementById('task-end-input').value = task.endTime;
      document.getElementById('task-repeat-select').value = task.repeat;
      document.getElementById('task-desc-input').value = task.description;
      
      document.getElementById('save-btn-text').innerText = '保存';
      
      // すでに削除ボタンが存在するかチェック
      const footer = document.querySelector('.modal-footer');
      let deleteBtn = document.getElementById('modal-delete-btn');
      if (!deleteBtn) {
        deleteBtn = document.createElement('button');
        deleteBtn.id = 'modal-delete-btn';
        deleteBtn.className = 'btn btn-danger';
        deleteBtn.innerHTML = '<span class="material-symbols-outlined">delete</span>';
        deleteBtn.onclick = () => deleteTask(task.id);
        footer.insertBefore(deleteBtn, footer.firstChild);
      }

      document.getElementById('task-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('task-modal').classList.remove('active');
    }

    // フォームの Private/Biz 切り替え
    function setFormTaskType(type) {
      state.formTaskType = type;
      
      const btns = document.querySelectorAll('#task-type-segment .segment-btn');
      btns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.classList.contains(type)) {
          btn.classList.add('active');
        }
      });
      
      populateProjectSelect();
    }

    // プロジェクト作成時のセグメント切り替え
    function setNewProjectType(type) {
      state.newProjectType = type;
      const btns = document.querySelectorAll('#new-project-type .segment-btn');
      btns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.classList.contains(type)) {
          btn.classList.add('active');
        }
      });
    }

    // ----------------------------------
    // タスクアクション (API通信 / ローカル処理)
    // ----------------------------------
    
    // タスクの追加・保存
    function submitTaskForm() {
      const id = document.getElementById('task-id-input').value;
      const taskName = document.getElementById('task-title-input').value.trim();
      const projectId = document.getElementById('task-project-select').value;
      
      if (!taskName) {
        alert('タスク名を入力してください。');
        return;
      }
      
      if (!projectId) {
        alert('プロジェクトを選択してください。プロジェクトがない場合は「フォルダ」タブから作成してください。');
        return;
      }

      const taskData = {
        id: id,
        type: state.formTaskType,
        projectId: projectId,
        task: taskName,
        date: document.getElementById('task-date-input').value,
        startTime: document.getElementById('task-start-input').value,
        endTime: document.getElementById('task-end-input').value,
        repeat: document.getElementById('task-repeat-select').value,
        description: document.getElementById('task-desc-input').value
      };

      // 新規作成かつ「続けて別のタスクを登録する」にチェックが入っているか判定
      const keepOpen = !id && document.getElementById('task-keep-open').checked;

      showSyncing(true);
      if (!keepOpen) {
        closeModal();
      }

      if (isGas) {
        const apiName = id ? 'updateTaskFromApp' : 'addNewTaskFromApp';
        google.script.run
          .withSuccessHandler(data => {
            state.tasks = data.tasks;
            state.projects = data.projects;
            state.doneTasks = data.doneTasks;
            initApp();
            showSyncing(false);
            
            if (keepOpen) {
              // モーダルを閉じずに、タスク名と詳細説明、時間のみをクリアして次の入力に備える
              document.getElementById('task-title-input').value = '';
              document.getElementById('task-desc-input').value = '';
              document.getElementById('task-start-input').value = '';
              document.getElementById('task-end-input').value = '';
              showToast('タスクを追加しました');
              // 入力欄にフォーカスを戻す
              document.getElementById('task-title-input').focus();
            } else {
              showToast(id ? 'タスクを更新しました' : 'タスクを追加しました');
            }
          })
          .withFailureHandler(err => {
            alert('エラーが発生しました: ' + err.message);
            showSyncing(false);
          })
          [apiName](taskData);
      } else {
        // モックモード
        setTimeout(() => {
          if (id) {
            const index = state.tasks.findIndex(t => t.id === id);
            if (index !== -1) {
              const proj = state.projects.find(p => p.id === taskData.projectId);
              state.tasks[index] = { ...state.tasks[index], ...taskData, projectName: proj ? proj.name : '' };
            }
          } else {
            const proj = state.projects.find(p => p.id === taskData.projectId);
            const newTask = {
              ...taskData,
              id: String(Date.now()),
              status: false,
              projectName: proj ? proj.name : ''
            };
            state.tasks.push(newTask);
          }
          initApp();
          showSyncing(false);
          
          if (keepOpen) {
            // モーダルを閉じずにクリア
            document.getElementById('task-title-input').value = '';
            document.getElementById('task-desc-input').value = '';
            document.getElementById('task-start-input').value = '';
            document.getElementById('task-end-input').value = '';
            showToast('タスクを追加しました(Mock)');
            // 入力欄にフォーカスを戻す
            document.getElementById('task-title-input').focus();
          } else {
            showToast(id ? 'タスクを更新しました(Mock)' : 'タスクを追加しました(Mock)');
          }
        }, 500);
      }
    }

    // タスク完了の実行
    function completeTask(event, taskId) {
      event.stopPropagation(); // カードクリックの編集モーダル防止

      const card = document.getElementById(`task-card-${taskId}`);
      if (card) {
        // 完了アニメーション開始
        card.classList.add('completing');
        const checkIcon = card.querySelector('.complete-btn span');
        if (checkIcon) checkIcon.style.color = 'var(--status-upcoming)';
      }

      // アニメーション(0.3秒)が終わる頃に、ローカルデータを楽観的（仮）に更新して即座に画面へ反映
      setTimeout(() => {
        // 同期失敗時のためのバックアップ
        const originalTasks = [...state.tasks];
        const originalDoneTasks = [...state.doneTasks];
        
        const taskIndex = state.tasks.findIndex(t => t.id === taskId);
        if (taskIndex === -1) return;
        
        const completedTask = { ...state.tasks[taskIndex], status: true };
        
        // 1. ローカルデータを即更新
        state.tasks.splice(taskIndex, 1);
        state.doneTasks.unshift(completedTask);
        if (state.doneTasks.length > 50) {
          state.doneTasks.pop(); // 直近50件制限
        }
        
        // 2. 即座に再描画（これでユーザーの待ち時間はゼロに）
        renderTaskList();
        renderHistoryList();
        
        // 3. 裏でGAS/モックと非同期で通信
        showSyncing(true);
        
        if (isGas) {
          google.script.run
            .withSuccessHandler(data => {
              // 成功時：最新のサーバーデータにそっと同期
              state.tasks = data.tasks;
              state.projects = data.projects;
              state.doneTasks = data.doneTasks;
              showSyncing(false);
              showToast('タスクを完了し、カレンダーへ同期しました');
            })
            .withFailureHandler(err => {
              // 失敗時：元のデータにロールバックして再描画
              console.error("完了同期エラー: " + err.message);
              state.tasks = originalTasks;
              state.doneTasks = originalDoneTasks;
              renderTaskList();
              renderHistoryList();
              
              showSyncing(false);
              alert('完了処理の同期に失敗しました: ' + err.message);
            })
            .completeTaskFromApp(taskId);
        } else {
          // モックモード
          setTimeout(() => {
            showSyncing(false);
            showToast('タスクを完了しました(Mockカレンダー同期)');
          }, 600);
        }
      }, 300);
    }

    // タスクの削除（シートから直接消す用：本番はスプレッドシートで行を削除するか、APIを作る。今回は簡易的にシートの行を削除またはステータス操作）
    function deleteTask(taskId) {
      if (!confirm('このタスクを削除してもよろしいですか？（Googleカレンダー連携は行われません）')) return;
      
      closeModal();
      showLoading(true);
      
      if (isGas) {
        // 簡易的にスプレッドシートからタスクを消すため、GAS側に専用の簡易関数を作るか、
        // または完了と同様に処理（今回はGAS側に「deleteTaskFromApp」が未実装なので、
        // ユーザーが混乱しないよう、完了させるかスプレッドシートで直接消してもらうように誘導するのが安全です。
        // もしくは、即座にCode.gsにdelete関数を追加することも可能ですが、
        // 今回はスプレッドシート上のデータを直接いじらずに「完了（カレンダー連携）」するのが基本フローなので、
        // ローカル削除＋GASでの行削除を実行するAPIを呼び出します）
        // ※今回はAPIの追加を極力シンプルにするため、完了と同様に行削除を実行する処理をGASに追加するか、
        // もしくは一度「完了」にしてしまってから手動で消していただくよう案内します。
        // ここではスプレッドシート行削除関数を別途呼び出せるようにするか、あるいはモックだけ動作させ、本番は未対応とします。
        // 安全のため、削除APIもGASでサポートします（後ほどCode.gsに追加しましょう）。
        
        // 削除関数のダミー実行を防ぐため、今回は「完了」として処理するか、
        // ユーザーの意図を汲んで行削除をGASで実行する「deleteTaskFromApp」を後で追加します。
        // 一旦 google.script.run.deleteTaskFromApp を呼び出す設計にします。
        if (typeof google.script.run.deleteTaskFromApp === 'function') {
          google.script.run
            .withSuccessHandler(data => {
              state.tasks = data.tasks;
              state.projects = data.projects;
              state.doneTasks = data.doneTasks;
              initApp();
              showLoading(false);
              showToast('タスクを削除しました');
            })
            .withFailureHandler(err => {
              alert('削除エラー: ' + err.message);
              showLoading(false);
            })
            .deleteTaskFromApp(taskId);
        } else {
          // 未実装エラーのフォールバック
          alert('削除APIがサーバー側で未実装です。スプレッドシート側で直接行を削除してください。');
          showLoading(false);
        }
      } else {
        // モックモード
        setTimeout(() => {
          state.tasks = state.tasks.filter(t => t.id !== taskId);
          initApp();
          showLoading(false);
          showToast('タスクを削除しました(Mock)');
        }, 400);
      }
    }

    // 新規プロジェクトの登録
    function submitNewProject() {
      const nameInput = document.getElementById('project-name-input');
      const name = nameInput.value.trim();

      if (!name) {
        alert('プロジェクト名を入力してください。');
        return;
      }

      // すでに#で始まっていない場合は#を追加
      const formattedName = name.startsWith('#') ? name : '#' + name;

      const projectData = {
        name: formattedName,
        type: state.newProjectType
      };

      showLoading(true);
      
      if (isGas) {
        google.script.run
          .withSuccessHandler(data => {
            state.tasks = data.tasks;
            state.projects = data.projects;
            state.doneTasks = data.doneTasks;
            initApp();
            showLoading(false);
            nameInput.value = '';
            showToast('プロジェクトを追加しました');
          })
          .withFailureHandler(err => {
            alert('プロジェクト追加エラー: ' + err.message);
            showLoading(false);
          })
          .addNewProjectFromApp(projectData);
      } else {
        // モック
        setTimeout(() => {
          const newProj = {
            id: String(100 + state.projects.length + 1),
            name: projectData.name,
            type: projectData.type
          };
          state.projects.push(newProj);
          initApp();
          showLoading(false);
          nameInput.value = '';
          showToast('プロジェクトを追加しました(Mock)');
        }, 500);
      }
    }

    // ----------------------------------
    // 補助関数群
    // ----------------------------------
    
    // YYYY-MM-DD フォーマットの日付文字列取得
    function formatDateString(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    // 今日からの相対日付文字列を取得 (モックデータ作成用)
    function getOffsetDateString(offsetDays) {
      const d = new Date();
      d.setDate(d.getDate() + offsetDays);
      return formatDateString(d);
    }

    // エスケープ処理
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
    }

    // ローディング表示切り替え
    function showLoading(show) {
      const loader = document.getElementById('loading');
      if (show) {
        loader.classList.add('active');
      } else {
        loader.classList.remove('active');
      }
    }

    // 非ブロッキング同期インジケータの表示切り替え
    function showSyncing(show) {
      const indicator = document.getElementById('sync-indicator');
      if (show) {
        indicator.classList.add('active');
      } else {
        indicator.classList.remove('active');
      }
    }

    // トースト通知を表示
    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').innerText = message;
      toast.classList.add('active');
      
      setTimeout(() => {
        toast.classList.remove('active');
      }, 3000);
    }

    // ドラッグ＆ドロップ（Sortable）の初期化
    function initSortable() {
      const lists = document.querySelectorAll('.task-list');
      lists.forEach(listEl => {
        Sortable.create(listEl, {
          animation: 150,
          handle: '.task-info',
          ghostClass: 'sortable-ghost',
          onEnd: function(evt) {
            saveNewSortOrder(evt.from);
          }
        });
      });
    }

    // 新しい並び順を同期して保存
    function saveNewSortOrder(listEl) {
      const cards = listEl.querySelectorAll('.task-card');
      const idList = Array.from(cards).map(card => card.getAttribute('data-id')).filter(Boolean);
      
      if (idList.length === 0) return;
      
      showSyncing(true);
      if (isGas) {
        google.script.run
          .withSuccessHandler(data => {
            state.tasks = data.tasks;
            state.projects = data.projects;
            state.doneTasks = data.doneTasks;
            showSyncing(false);
          })
          .withFailureHandler(err => {
            console.error("並び順保存エラー: " + err.message);
            showToast("並び順の保存に失敗しました");
            showSyncing(false);
            renderTaskList();
          })
          .updateSortOrderFromApp(idList);
      } else {
        const draggedTasks = idList.map(id => state.tasks.find(t => t.id === id)).filter(Boolean);
        const otherTasks = state.tasks.filter(t => !idList.includes(t.id));
        state.tasks = [...draggedTasks, ...otherTasks];
        setTimeout(() => {
          showSyncing(false);
          showToast("並び順を保存しました(Mock)");
        }, 600);
      }
    }
  </script>
</body>
